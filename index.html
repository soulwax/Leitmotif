<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leitmotif — EchoWarrior Scene Director</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <div class="titles">
        <h1>Leitmotif</h1>
        <p class="tagline">EchoWarrior scene director</p>
      </div>
      <div class="toolbar">
        <button id="btn-new">New</button>
        <button id="btn-open">Open…</button>
        <button id="btn-save">Save</button>
        <button id="btn-save-as">Save As…</button>
        <span class="toolbar-sep"></span>
        <button id="btn-undo" class="small" title="Undo (Ctrl+Z)" disabled>↶ Undo</button>
        <button id="btn-redo" class="small" title="Redo (Ctrl+Y)" disabled>↷ Redo</button>
        <span class="toolbar-sep"></span>
        <button id="btn-export" class="export">Export to game</button>
        <span id="doc-name" class="doc-name">— no scene —</span>
      </div>
    </header>

    <main>
      <section class="panel sequences">
        <div class="panel-head">
          <h2>Sequences</h2>
          <span id="seq-count" class="count"></span>
        </div>
        <ul id="sequence-list" class="seq-list">
          <li class="empty">Open a scene to see its sequences.</li>
        </ul>
        <div class="panel-head validation-head">
          <h2>Validation</h2>
          <button id="btn-validate" class="small">Validate</button>
        </div>
        <pre id="validation-output" class="output small-output">—</pre>
      </section>

      <section class="panel detail">
        <div class="panel-head">
          <h2 id="detail-title">Sequence</h2>
        </div>
        <div id="detail-body" class="detail-body">
          <p class="empty">Select a sequence to see its steps and beats.</p>
        </div>
      </section>

      <section class="panel stage-panel">
        <div class="panel-head">
          <h2>Preview</h2>
          <div class="transport">
            <button id="btn-play" class="small" title="Play / pause">▶</button>
            <input id="scrub" class="scrub" type="range" min="0" max="1" step="0.01" value="0" />
            <span id="scrub-time" class="scrub-time">0.0s</span>
            <button id="btn-refresh-preview" class="small" title="Rebuild preview">↻</button>
          </div>
        </div>
        <canvas id="stage" class="stage" width="1120" height="360"></canvas>
        <p id="stage-msg" class="stage-msg">Select a sequence to preview it.</p>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
