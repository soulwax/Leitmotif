document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

size:12px\">✕<\u002Fspan>\n<\u002Fdiv>\n<div style=\"flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 44px\">\n<div style=\"position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 30%, #221c2c 0%, #14111a 58%, #0c0a11 100%)\"><\u002Fdiv>\n<div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:46px 46px\"><\u002Fdiv>\n<div style=\"position:absolute;top:12%;left:50%;width:340px;height:340px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle, rgba(232,201,138,.16), transparent 62%);filter:blur(4px);animation:lmPulse 6s ease-in-out infinite\"><\u002Fdiv>\n<div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center\">\n<div style=\"width:44px;height:44px;transform:rotate(45deg);background:linear-gradient(135deg,#e8c98a,#c9a24f);border-radius:7px;box-shadow:0 0 34px rgba(216,178,104,.5);margin-bottom:24px\"><\u002Fdiv>\n<div style=\"font:400 30px/1.15 'Newsreader',serif;font-style:italic;color:#f4efe6;margin-bottom:12px\">Let's stage your first moment.<\u002Fdiv>\n<div style=\"font:400 14px/1.6 'Instrument Sans';color:#9a927f;max-width:430px;margin-bottom:30px\">Leitmotif is where you direct the game's scenes — a character walks in, turns to speak, the camera leans close. You arrange the moments; the stage plays exactly what the game will play. No code, ever.<\u002Fdiv>\n<div style=\"display:flex;gap:14px\">\n<div style=\"width:196px;padding:20px 18px;border-radius:14px;background:linear-gradient(180deg,rgba(216,178,104,.16),rgba(216,178,104,.06));border:1px solid rgba(216,178,104,.4);text-align:left;cursor:pointer\">\n<div style=\"width:30px;height:30px;border-radius:9px;background:linear-gradient(180deg,#e8c98a,#d8b268);display:flex;align-items:center;justify-content:center;color:#20180a;font-size:17px;margin-bottom:13px\">＋<\u002Fdiv>\n<div style=\"font:600 14px 'Instrument Sans';color:#f4efe6;margin-bottom:5px\">Start a new scene<\u002Fdiv>\n<div style=\"font-size:11.5px;line-height:1.45;color:#9a927f\">A blank, quiet stage — ready for your first character to walk on.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"width:196px;padding:20px 18px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid #2f2a3d;text-align:left;cursor:pointer\">\n<div style=\"width:30px;height:30px;border-radius:9px;background:#211d2c;border:1px solid #2f2a3d;display:flex;align-items:center;justify-content:center;color:#d8b268;font-size:15px;margin-bottom:13px\">◱<\u002Fdiv>\n<div style=\"font:600 14px 'Instrument Sans';color:#f4efe6;margin-bottom:5px\">Open the example<\u002Fdiv>\n<div style=\"font-size:11.5px;line-height:1.45;color:#9a927f\">Poke at <span style=\"color:#c7bfb0\">Ashfall Vale<\u002Fspan> — a finished scene, safe to explore and undo.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"width:196px;padding:20px 18px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid #2f2a3d;text-align:left;cursor:pointer\">\n<div style=\"width:30px;height:30px;border-radius:9px;background:#211d2c;border:1px solid #2f2a3d;display:flex;align-items:center;justify-content:center;color:#75f0d6;font-size:14px;margin-bottom:13px\">▷<\u002Fdiv>\n<div style=\"font:600 14px 'Instrument Sans';color:#f4efe6;margin-bottom:5px\">Take the short tour<\u002Fdiv>\n<div style=\"font-size:11.5px;line-height:1.45;color:#9a927f\">Sixty seconds on beats, steps and the stage — then you're directing.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"position:relative;z-index:2;margin-top:30px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:#6a6478\"><span style=\"color:#75f0d6\">✓<\u002Fspan>You can't break anything. Every change autosaves, and Undo remembers every step.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== px;background:#1d1a28;border:1px solid #221e2e\"><\u002Fdiv>\n<div style=\"height:44px;border-radius:8px;background:#211d2c;border:1px solid #2a2536\"><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"flex:3;display:flex;flex-direction:column;gap:8px\">\n<div style=\"height:26px;border-radius:8px;background:#1d1a28;border:1px solid #221e2e\"><\u002Fdiv>\n<div style=\"height:44px;border-radius:8px;background:#211d2c;border:1px solid #2a2536\"><\u002Fdiv>\n<div style=\"height:44px;border-radius:8px;background:#211d2c;border:1px solid #2a2536\"><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;color:#c7bfb0;background:rgba(22,19,32,.85);padding:4px 12px;border-radius:14px;border:1px solid #2a2536\">TIMELINE — full-width workspace<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"flex:none;height:80px;background:#100e15;border-top:1px solid #221e2e;display:flex;align-items:center;gap:11px;padding:0 14px\">\n<div style=\"width:36px;height:36px;border-radius:9px;background:#d8b268\"><\u002Fdiv>\n<div style=\"flex:1;display:flex;flex-direction:column;gap:7px\"><div style=\"height:9px;width:35%;background:#332e46;border-radius:3px\"><\u002Fdiv><div style=\"height:30px;background:#211d2c;border:1px solid #2f2a3d;border-radius:8px\"><\u002Fdiv><\u002Fdiv>\n<div style=\"font-size:9.5px;color:#4f4a5f;white-space:nowrap\">Inspector<br>docked below<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"position:absolute;top:22px;right:20px;width:186px;height:120px;background:radial-gradient(120% 100% at 45% 42%, #221c2e, #0c0a11);border:1px solid rgba(216,178,104,.35);border-radius:8px;box-shadow:0 14px 34px rgba(0,0,0,.5);overflow:hidden\">\n<div style=\"height:15px;background:#100e15;border-bottom:1px solid #221e2e;display:flex;align-items:center;padding:0 7px;font-size:8px;color:#6a6478\">◱ Stage — drag me anywhere<\u002Fdiv>\n<div style=\"position:absolute;left:30%;top:56%;width:9px;height:9px;border-radius:50%;background:#78e6cf\">< uot;:&quot;Mood&quot;,&quot;label&quot;:&quot;Gold accent&quot;}}\">\nclass Component extends DCLogic {\n  TOTAL = 7.0;\n  ACTORS = {eve:{name:'Eve',color:'#d8b268'},siegfried:{name:'Siegfried',color:'#78e6cf'},helena:{name:'Helena',color:'#c58fd6'},sophia:{name:'Sophia',color:'#8fb4d6'},enid:{name:'Enid',color:'#d69a8f'},rurik:{name:'Rurik',color:'#c7a86a'},maren:{name:'Maren',color:'#8fd6a8'},camera:{name:'Camera',color:'#b8b0a0'}};\n  BASE = {siegfried:{x:40,y:60},helena:{x:57,y:45},sophia:{x:50,y:27},enid:{x:43,y:77},rurik:{x:71,y:67},maren:{x:29,y:34}};\n  BIO = {eve:'The traveller, newly arrived',siegfried:\"The watchman at the vale's edge\",helena:'Lantern-keeper of the old road',sophia:'A voice from the treeline, unseen',enid:'The child who follows the lantern',rurik:'A hedge-knight, late to the vale',maren:'A healer with tired hands'};\n  FULLROSTER = ['eve','siegfried','helena','sophia','enid','rurik','maren'];\n  SOUNDS = [{id:'hum',name:'Lantern hum',desc:'A low, warm drone under the scene'},{id:'crows',name:'Distant crows',desc:'Unsettled, far off in the ash'},{id:'wind',name:'Wind through ash',desc:'Dry and constant'},{id:'bell',name:'A single bell',desc:'One toll, then silence'}];\n  ENTRY = {x:-7,y:52};\n  GLYPH = {walk:'→',say:'\\u201C',face:'\\u21BB',camera:'\\u25F2',prop:'\\u2726'};\n  VERBLBL = {walk:'Move',say:'Dialogue',face:'Turn',camera:'Camera',prop:'Action'};\n  SUGLBL = {walk:'Walk in',say:'Say a line',face:'Turn to face',camera:'Lean the camera in',prop:'Raise the lantern'};\n\n  state = {\n    currentTime:0, playing:false, saved:false,\n    selectedSeq:'eve', selectedStep:'s1', selectedBeatId:'b1',\n    addMenuStep:null, momentsOpen:false, loop:false, toast:'', speed:1,\n    eveDest:{x:50,y:52},\n    browserOpen:false, pickerOpen:false, pickerTab:'cast',\n    sceneName:'Ashfall Vale',\n    cast:['eve','siegfried','helena','sophia','enid'],\n    scenes:[\n      {id:'ashfall',name:'Ashfall Vale',seqs:4,beats:21,edited:'just now',dots:['#78 tor',label:'Keep in view',value:'eve'},\n          {key:'amount',type:'slider',label:'How close',value:60,hint:'A gentle nudge — not a jump cut.'},\n          {key:'over',type:'select',label:'Over how long',value:'The whole step',options:['Half a second','The whole step','Two seconds']}\n        ]},\n        {id:'b7',actor:'enid',verb:'walk',title:'Walk in',fields:[\n          {key:'who',type:'actor',label:'Who moves',value:'enid'},\n          {key:'to',type:'destination',label:'Walk to',value:'',hint:'Click anywhere on the stage to place where Enid stops.'},\n          {key:'speed',type:'select',label:'How fast',value:'Stroll',options:['Stroll','Walk','Hurry']}\n        ]}\n      ]},\n      {id:'s2',name:'She turns',dur:1.0,beats:[\n        {id:'b3',actor:'eve',verb:'face',title:'Turn to face',fields:[\n          {key:'who',type:'actor',label:'Who turns',value:'eve'},\n          {key:'toward',type:'select',label:'Face toward',value:'Siegfried',options:['Siegfried','Helena','Sophia','Enid','The camera']},\n          {key:'speed',type:'select',label:'Turn speed',value:'Natural',options:['Natural','Snap','Slow']}\n        ]},\n        {id:'b4',actor:'siegfried',verb:'face',title:'Turn to face',fields:[\n          {key:'who',type:'actor',label:'Who turns',value:'siegfried'},\n          {key:'toward',type:'select',label:'Face toward',value:'Eve',options:['Eve','Helena','Sophia','Enid','The camera']},\n          {key:'speed',type:'select',label:'Turn speed',value:'Natural',options:['Natural','Snap','Slow']}\n        ]}\n      ]},\n      {id:'s3',name:'The greeting',dur:3.4,beats:[\n        {id:'b5',actor:'eve',verb:'say',title:'Say a line',fields:[\n          {key:'who',type:'actor',label:'Who speaks',value:'eve'},\n          {key:'line',type:'text',label:'The line',value:\"You came. I wasn't sure the lantern would still be burning.\",hint:'Written exactly as the player will hear it.'},\n          {key:'tone',type:'select',label:'Tone',value:'Quiet, relieved',options:['Quiet, relieved','Wary','Warm','Grieving','Urgent']},\n          {key:'wait',type:'toggle',label:'Wait for the player to continue',value:true,hint:'Hold on this line until the player presses continue.'}\n        ]},\n        {id:'b6',actor:'helena',verb:'prop',title:'Raise the lantern',fields:[\n          {key:'who',type:'actor',label:'Who acts',value:'helena'},\n          {key:'action',type:'select',label:'What they do',value:'Raise the lantern',options:['Raise the lantern','Lower the lantern','Hold still']},\n          {key:'height',type:'select',label:'How high',value:'Shoulder height',options:['Waist','Shoulder height','Overhead']}\n        ]}\n      ]}\n    ]\n  };\n\n  lerp(a,b,t){return a+(b-a)*t;}\n  ease(t){t=Math.max(0,Math.min(1,t));return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}\n  angle(a,b){return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;}\n  fmt(t){t=Math.max(0,t);const s=Math.floor(t+0.0001);return '0:'+String(s).padStart(2,'0');}\n  clone(x){return JSON.parse(JSON.stringify(x));}\n  getBeat(id){for(const s of this.state.steps)for(const b of s.beats)if(b.id===id)return b;return null;}\n  findBeat(steps,id){for(const s of steps)for(const b of s.beats)if(b.id===id)return b;return null;}\n\n  componentDidMount(){this._onKey=(e)=>{\n    const meta=e.ctrlKey||e.metaKey;\n    if(meta&&(e.key==='z'||e.key==='Z')){e.preventDefault();if(e.shiftKey)this.redo();else this.undo();return;}\n    if(meta&&(e.key==='y'||e.key==='Y')){e.preventDefault();this.redo();return;}\n    const tag=((e.target&&e.target.tagName)||'').toLowerCase();if(tag==='input'||tag==='textarea'||tag==='select')return;\n    if(e.code==='Space'||e.key===' '){e.preventDefault();this.togglePlay();return;}\n    if(e.key==='ArrowLeft'){e.preventDefault();this.scrubBy(e.shiftKey?-1:-0.2);return;}\n    if(e.key==='ArrowRight'){e.preventDefault();this.scrubBy(e.shiftKey?1:0.2);return;}\n    if(e.key==='Delete'||e.key==='Backspace'){if(this.state.selectedBeatId){e.preventDefault();this.removeSelectedBeat();}return;}\n    if(e.key==='d'||e.key==='D'){if(this.state.selectedBeatId){e.preventDefault();this.duplicateSelectedBeat();}return;}\n  };window.addEventListener('keydown',this._onKey);}\n  componentWillUnmount(){if(this._raf)cancelAnimationFrame(this._raf);clearTimeout(this._toastT);if(this._onKey)window.removeEventListener('keydown',this._onKey);}\n\n  togglePlay=()=>{\n    if(this.state.playing){this.setState({playing:false});if(this._raf)cancelAnimationFrame(this._raf);return;}\n    let t=this.state.currentTime;if(t>=this.TOTAL-0.02)t=0;\n    this.setState({playing:true,currentTime:t});\n    this._last=performance.now();\n    this._raf=requestAnimationFrame(this.tick);\n  };\n  tick=(now)=>{\n    if(!this.state.playing)return;\n    const dt=((now-(this._last||now))/1000)*(this.state.speed||1);this._last=now;\n    let t=this.state.currentTime+dt;\n    if(t>=this.TOTAL){if(this.state.loop){this._last=now;this.setState({currentTime:0});this._raf=requestAnimationFrame(this.tick);return;}this.setState({currentTime:this.TOTAL,playing:false});return;}\n    this.setState({currentTime:t});\n    this._raf=requestAnimationFrame(this.tick);\n  };\n  onScrub=(e)=>{if(this._raf)cancelAnimationFrame(this._raf);this.setState({currentTime:parseFloat(e.target.value),playing:false});};\n  scrubBy(delta){if(this._raf)cancelAnimationFrame(this._raf);this.setState(s=>({currentTime:Math.max(0,Math.min(this.TOTAL,s.currentTime+delta)),playing:false}));}\n  cycleSpeed=()=>{const seq=[0.5,1,1.5,2];this.setState(s=>{const i=seq.indexOf(s.speed);return {speed:seq[(i+1)%seq.length]};});};\n  removeSelectedBeat(){const bid=this.state.selectedBeatId;if(!bid)return;this.mutate(s=>{const steps=this.clone(s.steps);for(const st of steps){const i=st.beats.findIndex(b=>b.id===bid);if(i>=0){st.beats.splice(i,1);break;}}return {steps,selectedBeatId:null,toast:'Removed the beat.'};});this.flashToast();}\n  duplicateSelectedBeat(){const bid=this.state.selectedBeatId;if(!bid)return;this.mutate(s=>{const steps=this.clone(s.steps);for(const st of steps){const i=st.beats.findIndex(b=>b.id===bid);if(i>=0){const copy=this.clone(st.beats[i]);copy.id='b'+Math.random().toString(36).slice(2,7);st.beats.splice(i+1,0,copy);return {steps,selectedBeatId:copy.id,toast:'Duplicated the beat.'};}}return {steps};});this.flashToast();}\n\n  selectBeat=(e)=>{this.setState({selectedBeatId:e.currentTarget.dataset.beat});};\n  selectStep=(e)=>{const id=e.currentTarget.dataset.step;if(this._raf)cancelAnimationFrame(this._raf);this.setState({selectedStep:id,currentTime:this.stepStart(id),playing:false});};\n  stepStart(id){let acc=0;for(const st of this.state.steps){if(st.id===id)return acc;acc+=st.dur;}return 0;}\n  stepSug(beats){const v=beats.map(b=>b.verb);if(!beats.length)return 'walk';if(v.includes('walk')&&!v.includes('face'))return 'face';if(v.includes('face')&&!v.includes('say'))return 'say';if(!v.includes('camera'))return 'camera';return 'say';}\n  selectSeq=(e)=>{this.setState({selectedSeq:e.currentTarget.dataset.seq});};\n  selectActor=(e)=>{e.stopPropagation();const id=e.currentTarget.dataset.actor;for(const s of this.state.steps)for(const b of s.beats)if(b.actor===id){this.setState({selectedBeatId:b.id});return;}};\n\n  onStageClick=(e)=>{\n    const sel=this.getBeat(this.state.selectedBeatId);\n    if(!sel||sel.verb!=='walk')return;\n    const r=e.currentTarget.getBoundingClientRect();\n    const x=Math.max(2,Math.min(98,((e.clientX-r.left)/r.width)*100));\n    const y=Math.max(6,Math.min(94,((e.clientY-r.top)/r.height)*100));\n    let label='A spot you marked',fx=x,fy=y;\n    const near=[['siegfried',this.BASE.siegfried],['helena',this.BASE.helena],['sophia',this.BASE.sophia],['enid',this.BASE.enid]];\n    for(const pair of near){const id=pair[0],p=pair[1];if(Math.hypot(p.x-x,p.y-y)<9){label='Beside '+this.ACTORS[id].name;fx=p.x+(x>=p.x?7:-7);fy=p.y;break;}}\n    this.mutate(s=>{const steps=this.clone(s.steps);const b=this.findBeat(steps,sel.id);if(b){const f=b.fields.find(
